name: Scheduled Score Run

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Trigger score run
        env:
          SUBSTRATE_API_URL: ${{ secrets.SUBSTRATE_API_URL }}
          SUBSTRATE_API_KEY: ${{ secrets.SUBSTRATE_API_KEY }}
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"identity_id":"system","Q":1.0,"nabla_phi":0.0,"tau":1.0}' \
            "$SUBSTRATE_API_URL/score"
